[pytest]
# 测试发现配置：
# - 默认只收 test_*.py / *_test.py，但本项目测试文件命名为 step*_validate.py / step*_http.py / step*_e2e.py
#   必须显式列入，否则 pytest 静默收集到 0 个测试（配合 CI 里的 || true 会更危险）
testpaths = tests
python_files = test_*.py *_test.py step*_validate.py step*_http.py step*_e2e.py
python_functions = test_*
python_classes = Test*

markers =
    # 标记"需要真实 OpenAI API Key"的测试。无 key 时这类测试应降级、不阻断 CI。
    # 当前算法对照 / 端点集成测试都不需要 key，故全部进入硬门禁；
    # 未来若新增真实调用 LLM 的测试，加上 @pytest.mark.needs_openai 即可自动隔离。
    needs_openai: 标记需要真实 OpenAI API Key 的测试；无 key 时降级，不纳入硬门禁

filterwarnings =
    ignore::DeprecationWarning

    <line x1="267" y1="123" x2="283" y2="123"/><polygon points="283,123 277,119 277,127"/>
    <line x1="401" y1="123" x2="417" y2="123"/><polygon points="417,123 411,119 411,127"/>
    <line x1="535" y1="123" x2="551" y2="123"/><polygon points="551,123 545,119 545,127"/>
    <line x1="669" y1="123" x2="685" y2="123"/><polygon points="685,123 679,119 679,127"/>
    <line x1="803" y1="123" x2="819" y2="123"/><polygon points="819,123 813,119 813,127"/>

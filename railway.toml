# Railway 部署配置（后端 FastAPI）
# 在 Railway 控制台用 GitHub 连接本仓库后，于服务设置里确认：
#   Root Directory = backend
#   Builder = Dockerfile（自动读取下方 dockerfilePath）
# 并在 Variables 中设置：CORS_ORIGINS / OPENAI_API_KEY（见 README「部署」章节）

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
rootDirectory = "backend"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

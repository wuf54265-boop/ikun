# AI 数据分析助手 —— 本地一键部署（后端 FastAPI + 前端 Next.js standalone）
# 用法：
#   1) export OPENAI_API_KEY=sk-xxxx        # 不设置则 AI 报告降级为结构化摘要
#   2) docker compose up --build
#   3) 前端 http://localhost:3000   后端 API 文档 http://localhost:8000/docs
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATA_DIR=/app/data
      - DB_PATH=/app/data/meta.db
      # 从宿主环境变量注入；未设置时后端仍会启动，仅 AI 报告走降级逻辑
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      # Parquet + SQLite 元数据持久化（容器重启不丢数据）
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      # python:3.11-slim 自带 python，直接探测 /health 端点
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      # 构建期内联到前端包（浏览器端调用，指向宿主机发布的后端端口）
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # node:20-alpine 自带 wget
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

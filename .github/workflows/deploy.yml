# CI/CD 模板（GitHub Actions）
# ---------------------------------------------------------------------------
# 本文件为"模板"：默认跑 lint + 构建 + 测试校验。后端"算法对照 / 端点集成"测试为硬门禁
# （失败即阻断 CI，不再接 || true）；仅"需要真实 OpenAI Key"的测试为软门禁（无 key 时降级）。
# 部署步骤（Vercel / Railway）以注释形式给出，需你自行配置以下 Secrets 后取消注释：
#   - VERCEL_TOKEN        Vercel 部署令牌
#   - VERCEL_ORG_ID       Vercel 组织 ID
#   - VERCEL_PROJECT_ID   Vercel 项目 ID
#   - RAILWAY_TOKEN       Railway 部署令牌
# 也可改用官方 Action（amondnet/vercel-action、battleman/railway-action 等）。
# ---------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ---------- 后端：lint + 测试 ----------
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run algorithm & integration tests (no OpenAI key needed)
        # 硬门禁：算法对照 / 端点集成测试失败即阻断 CI。这些测试不调用真实 OpenAI，无需 key。
        run: python -m pytest -q -m "not needs_openai"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run OpenAI-dependent tests (degrade if no key)
        # 软门禁：需要真实 OpenAI Key 的测试（当前无此类测试，收集为空属正常）；
        # 未来新增真实调用 LLM 的用例请加 @pytest.mark.needs_openai，无 key 时降级、不阻断 CI。
        run: python -m pytest -q -m "needs_openai" || true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ---------- 前端：lint + 构建 ----------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE: https://api.example.com/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint || true
      - name: Build
        run: npm run build

  # ---------- 部署（按需启用，需先配置 Secrets） ----------

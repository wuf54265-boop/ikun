  <script type="text/babel" data-presets="react">
    // framer-motion v11 UMD exposes the global as `Motion` (not `FramerMotion`).
    const FM = window.Motion || window.FramerMotion;
    const { motion } = FM;
    const { useState, useEffect, useRef } = React;

    const REDUCE = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const EASE_T = [0.16, 1, 0.3, 1];
    const EASE_O = [0.4, 0, 0.2, 1];

    // Suppress benign Framer Motion / list-key dev warnings
    const _origErr = console.error;
    console.error = function () {
      const a = arguments[0];
      if (typeof a === 'string' && (
        a.includes('Each child in a list should have a unique') ||
        a.includes('validateDOMNesting')
      )) return;
      _origErr.apply(console, arguments);
    };

    /* ===================== Icons ===================== */
    function ArrowUpRight({ className = "h-5 w-5" }) {

    function ClockIcon({ className = "h-7 w-7" }) {

    function GlobeIcon({ className = "h-7 w-7" }) {
      return (
        <svg className={className} width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">

        </svg>
      );
    }

    /* ===================== FadingImage (rAF fade-in, replaces space video) ===================== */
    function FadingImage({ src, className, style }) {
      const imgRef = useRef(null);
      const rafRef = useRef(null);
      useEffect(() => {
        const img = imgRef.current;
        if (!img) return;
        const FADE_MS = 650;
        const fadeTo = (target, duration) => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          const start = parseFloat(img.style.opacity || '0') || 0;
          const t0 = performance.now();
          const step = (now) => {
            const t = Math.min((now - t0) / duration, 1);
            img.style.opacity = String(start + (target - start) * t);
            if (t < 1) rafRef.current = requestAnimationFrame(step);
          };
          rafRef.current = requestAnimationFrame(step);
        };
        const onLoad = () => fadeTo(1, FADE_MS);
        if (img.complete) onLoad();
        else img.addEventListener('load', onLoad);
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          img.removeEventListener('load', onLoad);
        };
      }, [src]);
      return (
        <img
          ref={imgRef}
          src={src}
          alt=""
          className={className}
          style={{ opacity: 0, ...(style || {}) }}
        />
      );
    }

    /* ===================== EarthBackground (Three.js 3D rotating earth) ===================== */
    function EarthBackground() {
      const ref = useRef(null);

      useEffect(() => {
        const container = ref.current;
        if (!container || typeof THREE === 'undefined') return;
        const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let W = container.clientWidth, H = container.clientHeight;
        const isMobile = W < 768;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 1000);
        camera.position.set(0, 0, isMobile ? 6.5 : 5.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(W, H);
        if (THREE.sRGBEncoding) renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);

        const radius = isMobile ? 1.3 : 1.7;
        const seg = isMobile ? 32 : 64;
        const aspect = W / H;

        const earthGroup = new THREE.Group();
        earthGroup.rotation.z = 23.5 * Math.PI / 180; // axial tilt
        earthGroup.position.x = isMobile ? 0 : (aspect > 1.4 ? 1.7 : 1.0);
        earthGroup.position.y = isMobile ? 0.2 : 0.1;
        scene.add(earthGroup);

        const earthGeo = new THREE.SphereGeometry(radius, seg, seg);
        const earthMat = new THREE.MeshPhongMaterial({
          color: 0x21304a, specular: 0x223344, shininess: 8,
        });
        const earth = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earth);

        const loader = new THREE.TextureLoader();
        loader.crossOrigin = 'anonymous';
        loader.load(
          'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
          (tex) => {
            if (THREE.sRGBEncoding) tex.encoding = THREE.sRGBEncoding;
            earthMat.map = tex; earthMat.color.set(0xffffff); earthMat.needsUpdate = true;
          },
          undefined,
          () => {
            loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg',
              (tex2) => { if (THREE.sRGBEncoding) tex2.encoding = THREE.sRGBEncoding; earthMat.map = tex2; earthMat.color.set(0xffffff); earthMat.needsUpdate = true; });
          }
        );

        // atmosphere glow (fresnel, back-side shell)
        const atmGeo = new THREE.SphereGeometry(radius * 1.15, seg, seg);
        const atmMat = new THREE.ShaderMaterial({
          uniforms: {},
          vertexShader: 'varying vec3 vNormal; void main(){ vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
          fragmentShader: 'varying vec3 vNormal; void main(){ float intensity = pow(0.62 - dot(vNormal, vec3(0.0,0.0,1.0)), 4.0); gl_FragColor = vec4(0.30,0.60,1.0,1.0) * intensity; }',
          blending: THREE.AdditiveBlending,
          side: THREE.BackSide,
          transparent: true,
          depthWrite: false,
        });
        const atmosphere = new THREE.Mesh(atmGeo, atmMat);
        earthGroup.add(atmosphere);

        // stars (twinkling via shader)
        const starCount = isMobile ? 400 : 800;
        const starPos = new Float32Array(starCount * 3);
        const starPhase = new Float32Array(starCount);
        for (let i = 0; i < starCount; i++) {
          const r = 35 + Math.random() * 30;
          const th = Math.random() * Math.PI * 2;
          const ph = Math.acos(2 * Math.random() - 1);
          starPos[i * 3] = r * Math.sin(ph) * Math.cos(th);
          starPos[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th);
          starPos[i * 3 + 2] = r * Math.cos(ph);
          starPhase[i] = Math.random() * Math.PI * 2;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('aPhase', new THREE.BufferAttribute(starPhase, 1));
        const starMat = new THREE.ShaderMaterial({
          uniforms: { uTime: { value: 0 }, uSize: { value: isMobile ? 1.2 : 1.7 } },
          vertexShader: 'attribute float aPhase; uniform float uTime; uniform float uSize; varying float vTw; void main(){ vTw = 0.4 + 0.6 * abs(sin(uTime * 1.5 + aPhase)); vec4 mv = modelViewMatrix * vec4(position,1.0); gl_PointSize = uSize * (300.0 / -mv.z); gl_Position = projectionMatrix * mv; }',
          fragmentShader: 'varying float vTw; void main(){ vec2 c = gl_PointCoord - 0.5; float d = length(c); if(d > 0.5) discard; float a = smoothstep(0.5, 0.0, d) * vTw; gl_FragColor = vec4(1.0,1.0,1.0,a); }',
          transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
        });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // orbiting micro-particles (AI / data motes) — round glowing points via shader
        const orbN = isMobile ? 18 : 30;
        const orbPos = new Float32Array(orbN * 3);
        const orbPhase = new Float32Array(orbN);
        const orbData = [];
        for (let i = 0; i < orbN; i++) {
          const a = Math.random() * Math.PI * 2;
          const rr = radius * (1.35 + Math.random() * 0.5);
          const yy = (Math.random() - 0.5) * radius * 0.7;
          const phase = Math.random() * Math.PI * 2;
          orbData.push({ a: a, rr: rr, yy: yy, speed: 0.002 + Math.random() * 0.003, phase: phase });
          orbPos[i * 3] = Math.cos(a) * rr;
          orbPos[i * 3 + 1] = yy;
          orbPos[i * 3 + 2] = Math.sin(a) * rr;
          orbPhase[i] = phase;
        }
        const orbGeo = new THREE.BufferGeometry();
        orbGeo.setAttribute('position', new THREE.BufferAttribute(orbPos, 3));
        orbGeo.setAttribute('aPhase', new THREE.BufferAttribute(orbPhase, 1));
        const orbMat = new THREE.ShaderMaterial({
          uniforms: { uTime: { value: 0 }, uSize: { value: isMobile ? 0.08 : 0.12 } },
          vertexShader: 'attribute float aPhase; uniform float uTime; uniform float uSize; varying float vTw; void main(){ vTw = 0.7 + 0.3 * sin(uTime * 2.0 + aPhase); vec4 mv = modelViewMatrix * vec4(position,1.0); gl_PointSize = uSize * (300.0 / -mv.z); gl_Position = projectionMatrix * mv; }',
          fragmentShader: 'varying float vTw; void main(){ vec2 c = gl_PointCoord - 0.5; float d = length(c); if(d > 0.5) discard; float alpha = smoothstep(0.5, 0.0, d) * vTw; gl_FragColor = vec4(0.75, 1.0, 0.82, alpha); }',
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });
        const orbit = new THREE.Points(orbGeo, orbMat);
        scene.add(orbit);

        // lights: sun from upper-left, deep-blue ambient fill for the night side
        const sun = new THREE.DirectionalLight(0xffffff, 1.6);
        sun.position.set(5, 3, 5);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x1a2a4a, 1.1));

        // animation loop
        let raf = null, last = 0;
        const interval = isMobile ? 1000 / 30 : 0; // 30fps cap on mobile
        const spin = REDUCE ? 0 : 0.0022;
        function animate(t) {
          raf = requestAnimationFrame(animate);
          if (interval && t - last < interval) return;
          last = t;
          if (!REDUCE) {
            earth.rotation.y += spin;
            starMat.uniforms.uTime.value = t * 0.001;
            orbMat.uniforms.uTime.value = t * 0.001;
            for (let i = 0; i < orbN; i++) {
              const o = orbData[i]; o.a += o.speed;
              orbPos[i * 3] = Math.cos(o.a) * o.rr;
              orbPos[i * 3 + 2] = Math.sin(o.a) * o.rr;
            }
            orbGeo.attributes.position.needsUpdate = true;
          }
          renderer.render(scene, camera);
        }
        if (REDUCE) { renderer.render(scene, camera); }
        else { raf = requestAnimationFrame(animate); }

        // fade-in (synced with hero title reveal)
        requestAnimationFrame(() => { if (container) container.style.opacity = '1'; });

        function onResize() {
          W = container.clientWidth; H = container.clientHeight;
          camera.aspect = W / H; camera.updateProjectionMatrix();
          renderer.setSize(W, H);
        }
        window.addEventListener('resize', onResize);

        return () => {
          if (raf) cancelAnimationFrame(raf);
          window.removeEventListener('resize', onResize);
          scene.traverse((o) => {
            if (o.geometry) o.geometry.dispose();
            if (o.material) {
              const m = o.material;
              if (m.map) m.map.dispose();
              m.dispose();
            }
          });
          renderer.dispose();
          if (renderer.domElement && renderer.domElement.parentNode) {
            renderer.domElement.parentNode.removeChild(renderer.domElement);
          }
        };
      }, []);

      return (
        <div
          ref={ref}
          className="fixed inset-0 z-0 pointer-events-none"
          style={{ opacity: 0, transition: 'opacity 1.5s cubic-bezier(0.4,0,0.2,1)', background: 'radial-gradient(circle at 72% 45%, rgba(20,32,64,0.28), transparent 60%)' }}
          aria-hidden="true"
        />
      );
    }

    /* ===================== BlurText (word-by-word blur-in) ===================== */
    function BlurText({ text, className = "" }) {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              setInView(true);
              obs.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      const words = text.split(' ');
      const initial = REDUCE ? false : { filter: 'blur(10px)', opacity: 0, y: 50 };
      const animate = inView || REDUCE
        ? { filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'], opacity: [0, 0.5, 1], y: [50, -5, 0] }
        : {};

      return (
        <p
          ref={ref}
          className={className}
          style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={initial}
              animate={animate}
              transition={{ duration: 0.7, times: [0, 0.5, 1], ease: 'easeOut', delay: (i * 100) / 1000 }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }

    /* ===================== Reusable FadeUp ===================== */
    const fadeUpInitial = { filter: 'blur(10px)', opacity: 0, y: 20 };
    const fadeUpTarget = { filter: 'blur(0px)', opacity: 1, y: 0 };
    function FadeUp({ children, delay = 0, className = "", ...rest }) {
      return (
        <motion.div
          className={className}
          initial={REDUCE ? false : fadeUpInitial}
          animate={fadeUpTarget}
          transition={{ duration: 0.8, ease: EASE_T, delay }}
          {...rest}
        >
          {children}
        </motion.div>
      );
    }

    /* ===================== Navbar (scroll-glass > 80px, mobile hamburger) ===================== */
    function Navbar() {
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      useEffect(() => {
        let ticking = false;
        const onScroll = () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            setScrolled(window.scrollY > 80);
            ticking = false;
          });
